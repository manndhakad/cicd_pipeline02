trigger: none

pool: infra_pipeline02

stages:
  - stage: TerraformPlan
    displayName: Terraform init plan 
    jobs:
      - job: Terraform_IVP
        displayName: Terraform IVP
        steps:
          - task: TerraformInstaller@1
            displayName: Terraform install
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            displayName: Terraform init
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'infra_pipeline02'
              backendAzureRmStorageAccountName: 'stpipeline00022'
              backendAzureRmContainerName: 'pipeline'
              backendAzureRmKey: 'terraform.tfstate'
          - task: TerraformTask@5
            displayName: Terraform Plan
            inputs:
              provider: 'azurerm'
              command: 'plan'
              environmentServiceNameAzureRM: 'infra_pipeline02'
  - stage: TerraformApply
    displayName: Terraform Apply
    jobs:
      - job: 
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: 'latest'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendAzureRmStorageAccountName: 'stpipeline00022'
              backendAzureRmContainerName: 'pipeline'
              backendAzureRmKey: 'terraform.tfstate'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'apply'
              environmentServiceNameAzureRM: 'infra_pipeline02'